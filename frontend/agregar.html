<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Agregar - AgroMonitor</title><link rel="stylesheet" href="css/estilos.css"></head>
<body>
    <div class="contenedor">
        <nav class="navbar">
            <div class="logo">AgroMonitor</div>
            <a href="index.html">Inicio</a><a href="agregar.html" class="activo">Agregar Área</a><a href="editar.html">Editar Área</a><a href="configuracion.html">Configuración</a>
        </nav>
        <div class="formulario-caja">
            <h2>Agregar Nueva Área</h2>
            <form id="form-agregar" novalidate>
                <div class="form-group"><label>Nombre del cultivo</label><input type="text" id="nombre"><span class="error-text" id="err-nombre"></span></div>
                <div class="form-group"><label>Confirmar nombre</label><input type="text" id="nombre-conf"><span class="error-text" id="err-conf"></span></div>
                <div class="form-group"><label>Temperatura inicial (°C)</label><input type="number" id="temp"><span class="error-text" id="err-temp"></span></div>
                <div class="form-group"><label>Humedad aire (%)</label><input type="number" id="humAire"></div>
                <div class="form-group"><label>Humedad suelo (%)</label><input type="number" id="humSuelo"></div>
                <div class="form-group"><label>Tiempo de riego (horas)</label><input type="number" id="riego"></div>
                <div class="form-group"><label>Tamaño del terreno (m²)</label><input type="number" id="tamano"></div>
                <button type="submit" class="btn">Agregar</button>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script><script src="js/agregar.js"></script>
</body>
</html>
