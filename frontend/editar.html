<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Editar - AgroMonitor</title><link rel="stylesheet" href="css/estilos.css"></head>
<body>
    <div class="contenedor">
        <nav class="navbar">
            <div class="logo">AgroMonitor</div>
            <a href="index.html">Inicio</a><a href="agregar.html">Agregar Área</a><a href="editar.html" class="activo">Editar Área</a><a href="configuracion.html">Configuración</a>
        </nav>
        <h2>Modificar / Eliminar Área</h2>
        <table id="tabla-editar">
            <thead><tr><th>Área</th><th>Cultivo</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
        <div id="form-editar-caja" class="formulario-caja oculto" style="margin-top: 20px;">
            <h3>Editar Cultivo</h3>
            <form id="form-editar">
                <input type="hidden" id="edit-id">
                <div class="form-group"><label>Nombre</label><input type="text" id="edit-nombre"></div>
                <div class="form-group"><label>Riego (horas)</label><input type="number" id="edit-riego"></div>
                <button type="button" id="btn-guardar-edicion" class="btn">Guardar</button>
                <button type="button" id="btn-cancelar" class="btn btn-danger">Cancelar</button>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script><script src="js/editar.js"></script>
</body>
</html>
